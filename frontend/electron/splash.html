<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VidGnost 启动中</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1422;
        --accent: #18c5e8;
        --accent-soft: rgba(24, 197, 232, 0.2);
        --text: rgba(244, 247, 252, 0.96);
        --muted: rgba(129, 139, 160, 0.9);
        --line: rgba(224, 230, 239, 0.84);
        --line-soft: rgba(224, 230, 239, 0.24);
        --success: #63d8b6;
        --error: #ff9b73;
        --spinner: #5d7cff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "Geist Sans", "Segoe UI", "Microsoft YaHei UI", sans-serif;
      }

      body {
        -webkit-user-select: none;
        user-select: none;
      }

      .splash {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 24px 22px 16px;
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .brand-logo {
        width: 70px;
        height: 70px;
        object-fit: contain;
        filter: invert(1) brightness(1.06) drop-shadow(0 10px 20px rgba(5, 10, 18, 0.28));
        mix-blend-mode: screen;
        opacity: 0.94;
      }

      .brand-name {
        margin: 10px 0 0;
        color: var(--accent);
        font-size: 21px;
        line-height: 1;
        font-weight: 700;
        letter-spacing: -0.035em;
      }

      .brand-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
        font-weight: 600;
      }

      .progress-block {
        margin-top: 28px;
      }

      .progress-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 11px;
        line-height: 1.3;
      }

      .progress-title {
        color: rgba(153, 162, 180, 0.88);
        font-weight: 600;
      }

      .progress-value {
        color: #5b73ff;
        font-size: 22px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.035em;
      }

      .track {
        position: relative;
        margin-top: 10px;
        height: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
        background: transparent;
      }

      .fill {
        position: absolute;
        inset: 1px auto 1px 1px;
        width: calc(var(--progress, 0%) - 2px);
        max-width: calc(100% - 2px);
        min-width: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(90, 120, 255, 0.95), rgba(104, 141, 255, 0.98));
        box-shadow: 0 0 16px rgba(90, 120, 255, 0.2);
        transition: width 220ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .steps {
        margin-top: 18px;
        display: grid;
        gap: 6px;
      }

      .step {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        min-height: 32px;
        padding: 0 4px;
        color: rgba(186, 194, 210, 0.5);
      }

      .step.complete {
        color: rgba(195, 205, 221, 0.92);
      }

      .step.active {
        padding: 0 10px;
        border: 1px solid rgba(228, 234, 243, 0.92);
        border-radius: 7px;
        color: rgba(242, 246, 252, 0.98);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .step.error {
        padding: 0 10px;
        border: 1px solid rgba(255, 155, 115, 0.42);
        border-radius: 7px;
        color: rgba(255, 238, 231, 0.98);
        background: rgba(255, 155, 115, 0.04);
      }

      .step.pending {
        color: rgba(131, 140, 158, 0.54);
      }

      .step-label {
        min-width: 0;
        font-size: 12px;
        line-height: 1.25;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .step-meta {
        min-width: 48px;
        text-align: right;
        font-size: 11px;
        line-height: 1;
        font-weight: 500;
        color: rgba(131, 140, 158, 0.78);
        font-variant-numeric: tabular-nums;
      }

      .step.complete .step-meta {
        color: rgba(131, 140, 158, 0.9);
      }

      .step.active .step-meta {
        min-width: 24px;
        color: #5f74ff;
        font-size: 16px;
        letter-spacing: 0.08em;
        transform: translateY(-0.5px);
      }

      .step.error .step-meta {
        color: var(--error);
      }

      .step-icon {
        position: relative;
        width: 18px;
        height: 18px;
        display: grid;
        place-items: center;
      }

      .step.complete .step-icon::before {
        content: "";
        width: 9px;
        height: 5px;
        border-left: 2px solid var(--success);
        border-bottom: 2px solid var(--success);
        transform: rotate(-45deg) translateY(-1px);
      }

      .step.pending .step-icon::before {
        content: "";
        width: 10px;
        height: 10px;
        border: 1.5px solid rgba(103, 113, 131, 0.52);
        border-radius: 999px;
      }

      .step.active .step-icon::before {
        content: "";
        width: 12px;
        height: 12px;
        border: 1.5px solid rgba(93, 124, 255, 0.18);
        border-top-color: var(--spinner);
        border-left-color: var(--spinner);
        border-radius: 999px;
        animation: spin 920ms linear infinite;
      }

      .step.error .step-icon::before {
        content: "!";
        width: 12px;
        height: 12px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(255, 155, 115, 0.14);
        color: var(--error);
        font-size: 9px;
        line-height: 1;
        font-weight: 700;
      }

      .detail {
        margin-top: 8px;
        min-height: 16px;
        color: rgba(144, 153, 170, 0.82);
        font-size: 10px;
        line-height: 1.35;
        opacity: 0;
        transition: opacity 140ms ease;
      }

      .detail.is-visible {
        opacity: 1;
      }

      .version {
        margin-top: auto;
        text-align: right;
        color: rgba(106, 114, 130, 0.86);
        font-size: 10px;
        line-height: 1;
        letter-spacing: 0.04em;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="splash" aria-live="polite">
      <section class="brand">
        <img class="brand-logo" src="../public/icon.svg" alt="VidGnost" />
        <h1 class="brand-name">VidGnost</h1>
        <p class="brand-subtitle">本地优先人工智能视频分析</p>
      </section>

      <section class="progress-block" aria-hidden="true">
        <div class="progress-row">
          <span class="progress-title" id="status-title">初始化引擎</span>
          <span class="progress-value" id="status-progress">8%</span>
        </div>
        <div class="track">
          <div class="fill" id="progress-fill"></div>
        </div>
      </section>

      <section class="steps" id="steps"></section>
      <p class="detail" id="status-detail"></p>
      <p class="sr-only" id="status-live"></p>
      <div class="version" id="status-version">v0.1.0-local</div>
    </main>

    <script>
      const progressTitleElement = document.getElementById("status-title")
      const progressTextElement = document.getElementById("status-progress")
      const progressFillElement = document.getElementById("progress-fill")
      const detailElement = document.getElementById("status-detail")
      const liveElement = document.getElementById("status-live")
      const versionElement = document.getElementById("status-version")
      const stepsElement = document.getElementById("steps")

      const DEFAULT_STEPS = [
        { id: "load-renderer", label: "加载前端资源", status: "active" },
        { id: "connect-backend", label: "连接本地服务", status: "pending" },
        { id: "sync-overview", label: "同步任务概览", status: "pending" },
        { id: "sync-config", label: "同步界面配置", status: "pending" },
        { id: "settle-ui", label: "稳定首帧并挂载 UI", status: "pending" },
      ]

      const startupAt = performance.now()
      const stepStats = new Map()
      stepStats.set(DEFAULT_STEPS[0].id, {
        startedAt: startupAt,
        completedAt: null,
        lastStatus: "active",
      })

      let lastRenderedSteps = DEFAULT_STEPS.map((step) => ({ ...step }))
      let renderTicker = null

      function formatDuration(durationMs) {
        if (!Number.isFinite(durationMs)) {
          return "-"
        }

        if (durationMs <= 0) {
          return "1毫秒"
        }

        if (durationMs < 1000) {
          return `${Math.max(1, Math.round(durationMs))}毫秒`
        }

        if (durationMs < 10_000) {
          return `${(Math.round(durationMs / 100) / 10).toFixed(1)}秒`
        }

        return `${Math.max(1, Math.round(durationMs / 1000))}秒`
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;")
      }

      function isKnownStepStatus(status) {
        return status === "active" || status === "complete" || status === "error" || status === "pending"
      }

      function normalizeSteps(steps) {
        if (!Array.isArray(steps) || steps.length === 0) {
          return DEFAULT_STEPS.map((step) => ({ ...step }))
        }

        return steps.map((step, index) => ({
          id:
            typeof step?.id === "string" && step.id.trim()
              ? step.id.trim()
              : DEFAULT_STEPS[index]?.id || `step-${index + 1}`,
          label:
            typeof step?.label === "string" && step.label.trim()
              ? step.label.trim()
              : DEFAULT_STEPS[index]?.label || `步骤 ${index + 1}`,
          status: isKnownStepStatus(step?.status) ? step.status : "pending",
        }))
      }

      function deriveProgress(steps) {
        if (!steps.length) {
          return 0
        }

        const completedSteps = steps.filter((step) => step.status === "complete").length
        return Math.max(0, Math.min(100, Math.round((completedSteps / steps.length) * 100)))
      }

      function getCurrentStep(steps) {
        return (
          steps.find((step) => step.status === "active" || step.status === "error") ||
          [...steps].reverse().find((step) => step.status === "complete") ||
          steps[0] ||
          null
        )
      }

      function syncStepStats(steps) {
        const now = performance.now()
        const activeIds = new Set(steps.map((step) => step.id))

        for (const stepId of stepStats.keys()) {
          if (!activeIds.has(stepId)) {
            stepStats.delete(stepId)
          }
        }

        steps.forEach((step, index) => {
          const previousStepMetrics = index > 0 ? stepStats.get(steps[index - 1].id) : null
          const metrics = stepStats.get(step.id) || {
            startedAt: null,
            completedAt: null,
            lastStatus: "pending",
          }
          const fallbackStartedAt = previousStepMetrics?.completedAt || startupAt

          if (step.status !== "pending" && metrics.startedAt === null) {
            metrics.startedAt = fallbackStartedAt
          }

          if (step.status === "complete" && metrics.completedAt === null) {
            metrics.completedAt = now
          }

          metrics.lastStatus = step.status
          stepStats.set(step.id, metrics)
        })
      }

      function getProgressFillWidth(progress) {
        if (progress <= 0) {
          return "0"
        }

        if (progress >= 100) {
          return "calc(100% - 2px)"
        }

        return `calc(${progress}% - 2px)`
      }

      function renderSteps(steps) {
        const now = performance.now()

        const markup = steps
          .map((step) => {
            const metrics = stepStats.get(step.id)
            const stateClass = step.status
            const duration =
              step.status === "complete" && metrics?.startedAt !== null && metrics?.completedAt !== null
                ? formatDuration(metrics.completedAt - metrics.startedAt)
                : step.status === "active"
                  ? "..."
                  : step.status === "error"
                    ? "失败"
                    : "-"

            return `
              <div class="step ${stateClass}">
                <span class="step-icon" aria-hidden="true"></span>
                <span class="step-label">${escapeHtml(step.label)}</span>
                <span class="step-meta">${escapeHtml(duration)}</span>
              </div>
            `
          })
          .join("")

        stepsElement.innerHTML = markup
      }

      function applyState(nextState) {
        const steps = normalizeSteps(nextState.steps)
        const rawProgress = Number(nextState.progress)
        const progress = Number.isFinite(rawProgress)
          ? Math.max(0, Math.min(100, Math.round(rawProgress)))
          : deriveProgress(steps)
        const currentStep = getCurrentStep(steps)
        const title = nextState.title || "初始化引擎"
        const progressTitle = nextState.message || currentStep?.label || title
        const detail = nextState.detail || ""
        const version = nextState.version || versionElement.textContent || "v0.1.0-local"
        const hasActiveStep = steps.some((step) => step.status === "active")

        syncStepStats(steps)
        lastRenderedSteps = steps

        progressTitleElement.textContent = progressTitle
        progressTextElement.textContent = `${progress}%`
        progressFillElement.style.setProperty("--progress", `${progress}%`)
        progressFillElement.style.width = getProgressFillWidth(progress)
        detailElement.textContent = detail
        detailElement.classList.toggle("is-visible", Boolean(detail))
        versionElement.textContent = version
        liveElement.textContent = `${title}，${currentStep?.label || progressTitle}，进度 ${progress}%`

        renderSteps(steps)

        if (renderTicker === null && hasActiveStep) {
          renderTicker = window.setInterval(() => renderSteps(lastRenderedSteps), 120)
        }

        if (!hasActiveStep && renderTicker !== null) {
          window.clearInterval(renderTicker)
          renderTicker = null
        }
      }

      applyState({
        progress: 0,
        title: "初始化引擎",
        message: "加载前端资源",
        detail: "准备应用窗口、图标与基础运行环境。",
        version: "v0.1.0-local",
        steps: DEFAULT_STEPS,
      })

      if (window.vidGnostSplash?.onState) {
        window.vidGnostSplash.onState((state) => {
          applyState(state || {})
        })
      }
    </script>
  </body>
</html>
