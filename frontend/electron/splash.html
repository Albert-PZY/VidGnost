<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VidGnost 启动中</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111b;
        --shell: rgba(11, 19, 31, 0.96);
        --shell-border: rgba(89, 123, 156, 0.28);
        --shell-edge: rgba(255, 255, 255, 0.04);
        --panel: rgba(14, 23, 37, 0.92);
        --panel-border: rgba(72, 102, 132, 0.24);
        --accent: #3cb8d9;
        --accent-soft: rgba(60, 184, 217, 0.14);
        --text: rgba(238, 246, 255, 0.94);
        --muted: rgba(173, 191, 212, 0.72);
        --track: rgba(78, 105, 132, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "Geist Sans", "Segoe UI", "Microsoft YaHei UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        -webkit-user-select: none;
        user-select: none;
      }

      .shell {
        width: min(100vw - 36px, 548px);
        min-height: 324px;
        padding: 22px;
        border: 1px solid var(--shell-border);
        border-radius: 18px;
        background: var(--shell);
        box-shadow:
          inset 0 1px 0 var(--shell-edge),
          0 22px 44px rgba(0, 0, 0, 0.24);
      }

      .brand {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 18px;
        align-items: center;
      }

      .logo-wrap {
        display: grid;
        place-items: center;
        width: 92px;
        height: 92px;
        border-radius: 16px;
        border: 1px solid rgba(91, 124, 156, 0.32);
        background: rgba(14, 23, 37, 0.94);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .logo {
        width: 62px;
        height: 62px;
        object-fit: contain;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid rgba(60, 184, 217, 0.22);
        background: var(--accent-soft);
        color: rgba(205, 233, 240, 0.88);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
      }

      .title {
        margin: 12px 0 0;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .status-panel {
        margin-top: 22px;
        padding: 18px;
        border-radius: 14px;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .status-title {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(198, 216, 236, 0.74);
      }

      .progress-value {
        font-variant-numeric: tabular-nums;
        font-size: 12px;
        color: rgba(213, 227, 244, 0.76);
      }

      .message {
        margin-top: 14px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .detail {
        margin-top: 7px;
        min-height: 42px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .progress-track {
        position: relative;
        margin-top: 16px;
        height: 4px;
        border-radius: 999px;
        background: var(--track);
        overflow: hidden;
      }

      .progress-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 6%;
        border-radius: inherit;
        background: var(--accent);
        transition: width 180ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 18px;
        color: rgba(173, 191, 212, 0.68);
        font-size: 12px;
        line-height: 1.6;
      }

      .footer-mark {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .footer-mark::before {
        content: "";
        width: 28px;
        height: 1px;
        background: rgba(60, 184, 217, 0.44);
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-live="polite">
      <section class="brand">
        <div class="logo-wrap">
          <img class="logo" src="../public/icon.svg" alt="VidGnost" />
        </div>
        <div>
          <div class="eyebrow">Local Workbench</div>
          <h1 class="title">VidGnost</h1>
          <p class="subtitle">本地优先的视频分析工作台正在完成基础数据初始化，并预热核心页面与运行时信息。</p>
        </div>
      </section>

      <section class="status-panel">
        <div class="status-row">
          <span class="status-title" id="status-title">正在启动 VidGnost</span>
          <span class="progress-value" id="status-progress">06%</span>
        </div>
        <div class="message" id="status-message">正在创建启动上下文</div>
        <div class="detail" id="status-detail">准备应用窗口、图标与基础运行环境。</div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </section>

      <footer class="footer">
        <span class="footer-mark">启动阶段会一次性预热主工作台视图</span>
        <span>完成后再显示主界面</span>
      </footer>
    </main>

    <script>
      const titleElement = document.getElementById("status-title")
      const messageElement = document.getElementById("status-message")
      const detailElement = document.getElementById("status-detail")
      const progressTextElement = document.getElementById("status-progress")
      const progressFillElement = document.getElementById("progress-fill")

      function applyState(nextState) {
        const progress = Math.max(0, Math.min(100, Number(nextState.progress) || 0))
        titleElement.textContent = nextState.title || "正在启动 VidGnost"
        messageElement.textContent = nextState.message || "正在准备工作台"
        detailElement.textContent = nextState.detail || "请稍候，应用正在完成基础初始化。"
        progressTextElement.textContent = `${String(progress).padStart(2, "0")}%`
        progressFillElement.style.width = `${progress}%`
      }

      applyState({
        progress: 6,
        title: "正在启动 VidGnost",
        message: "正在创建启动上下文",
        detail: "准备应用窗口、图标与基础运行环境。",
      })

      if (window.vidGnostSplash?.onState) {
        window.vidGnostSplash.onState((state) => {
          applyState(state || {})
        })
      }
    </script>
  </body>
</html>
