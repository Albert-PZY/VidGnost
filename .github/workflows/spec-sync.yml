name: spec-sync-guard

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  validate-spec-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect changed files
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.base_ref }}"
            git fetch origin "${base_ref}" --depth=1
            echo "diff_range=origin/${base_ref}...HEAD" >> "$GITHUB_OUTPUT"
            git diff --name-only "origin/${base_ref}"...HEAD > changed-files.txt
          else
            before_sha="${{ github.event.before }}"
            if [[ -n "${before_sha}" && "${before_sha}" != "0000000000000000000000000000000000000000" ]]; then
              echo "diff_range=${before_sha}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
              git diff --name-only "${before_sha}" "${{ github.sha }}" > changed-files.txt
            else
              echo "diff_range=${{ github.sha }}^!" >> "$GITHUB_OUTPUT"
              git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" > changed-files.txt
            fi
          fi

          cat changed-files.txt

      - name: Enforce spec sync for code changes
        shell: bash
        env:
          SPEC_SYNC_DIFF_RANGE: ${{ steps.changed.outputs.diff_range }}
        run: |
          set -euo pipefail
          mapfile -t changed_files < changed-files.txt
          node scripts/check-spec-sync.mjs "${changed_files[@]}"

      - name: Validate OpenSpec structure
        run: node scripts/check-openspec.mjs
